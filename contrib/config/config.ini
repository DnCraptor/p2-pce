# config.ini — PCE Mac Plus для RP2350
# Файл читается из pce/config.ini на SD карте.
#
# Секция [pce] — аппаратные параметры RP2350 (parse_pce_ini).
# Все остальные секции — конфигурация эмулятора (libini → mac_new).

# ---------------------------------------------------------------------------
[pce]
# ---------------------------------------------------------------------------
# Тактовая частота RP2350 в МГц. Менять осторожно — влияет на VGA/I2S PIO.
cpu_freq    = 504
psram_freq  = 84
flash_freq  = 66
volume      = 12

# ---------------------------------------------------------------------------
[system]
# ---------------------------------------------------------------------------
# mac-plus  — Mac 128K / 512K / Plus (68000, 7.8336 MHz)
# mac-se    — Mac SE (68000, ADB клавиатура)
# mac-classic — Mac Classic
model = mac-plus

# ---------------------------------------------------------------------------
[ram]
# ---------------------------------------------------------------------------
# Mac 128K: sizek = 128
# Mac 512K: sizek = 512
# Mac Plus:  sizem = 1, 2 или 4
address = 0x000000
sizem   = 4
# RAM выделяется через malloc() → попадает в PSRAM (pcmalloc)
# Видеобуфер живёт внутри этого блока (конец RAM - 0x5900)

# ---------------------------------------------------------------------------
[rom]
# ---------------------------------------------------------------------------
# ROM Mac Plus (64K, адрес 0x400000)
# Файл кладётся на SD в pce/mac-128k.rom
address = 0x400000
size    = 65536
file    = mac-128k.rom
# Если у вас 128K ROM (Mac Plus v3):
# size  = 131072
# file  = macplus.rom

# ---------------------------------------------------------------------------
[keyboard]
# ---------------------------------------------------------------------------
# Тип клавиатуры: 1 = стандартная Mac, 2 = Mac Plus
model = 1
intl  = 0
keypad_motion = 0

# ---------------------------------------------------------------------------
[iwm]
# ---------------------------------------------------------------------------
# Дисководы подключаются как секции [drive] внутри [iwm].
# Образ диска кладётся на SD в pce/system.img (формат raw GCR 400K / 800K)
[drive]
drive    = 1
type     = auto
file     = system.img
inserted = 1
locked   = 1
# rotate  = 0   ; вращение при чтении (для проблемных образов)

# ---------------------------------------------------------------------------
[video]
# ---------------------------------------------------------------------------
# address вычисляется автоматически (RAM_size - 0x5900).
# При headless можно не указывать — mac_setup_video всё равно создаёт
# mac_video_t, но trm==NULL значит trm_open не вызывается.
width  = 512
height = 342

# ---------------------------------------------------------------------------
[sound]
# ---------------------------------------------------------------------------
# driver = null  → звук отключён (snd_write возвращает 1, не крашится)
# driver = rp2350 → будущий I2S/PWM адаптер (реализовать snd_rp2350_open)
lowpass = 6000
# driver = null
